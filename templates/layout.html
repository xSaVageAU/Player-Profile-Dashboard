{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Username}}</title>
    <meta name="description" content="Dashboard for {{.Username}}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <!-- SkinView3D (Local) -->
    <script src="/static/js/skinview3d.bundle.js"></script>
</head>
<body>
    <header class="container">
        <nav style="display: flex; justify-content: center; align-items: center; padding: 2rem 0;">
            <form action="/" method="GET" style="display: flex; width: 100%; max-width: 600px; gap: 0.5rem;">
                <input type="text" name="uuid" placeholder="Enter Player UUID..." required
                    style="flex: 1; padding: 0.8rem 1.2rem; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s;">
                <button type="submit" 
                    style="padding: 0.8rem 1.5rem; border-radius: 12px; background: var(--accent-purple); border: none; color: white; cursor: pointer; font-weight: 600; transition: opacity 0.2s;">
                    Search
                </button>
            </form>
        </nav>
    </header>

    <main>
        {{template "content" .}}
    </main>

    <footer style="padding: 4rem 0;"></footer>

    <!-- Scripts -->
    <script src="/static/js/viewer.js"></script>
    <script src="/static/js/tabs.js"></script>
</body>
</html>
{{end}}
